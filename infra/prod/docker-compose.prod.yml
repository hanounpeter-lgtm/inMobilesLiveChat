# Production stack for inChat. Run from infra/prod with a .env.prod file:
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
name: inchat-prod

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    # 9000 must be public so browsers can fetch presigned attachment URLs.
    ports:
      - '9000:9000'
    volumes:
      - miniodata:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 4;
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY};
      mc mb --ignore-existing local/${S3_BUCKET};
      exit 0;
      "

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit/livekit.yaml --node-ip ${PUBLIC_IP}
    volumes:
      - ./livekit.yaml:/etc/livekit/livekit.yaml:ro
    # Ports fit the server's already-open firewall (no AWS change needed).
    ports:
      - '8050:8050'
      - '8057:8057'
      - '8002:8002/udp'
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: infra/prod/Dockerfile.api
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: infra/prod/Dockerfile.web
    depends_on:
      - api
    ports:
      - '8055:8055'
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
