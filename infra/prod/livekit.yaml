# Signaling (port 7880) stays internal — Caddy proxies /rtc to it over the
# same public 8055 origin. Only the media port (8057) is published, on the
# server's already-open firewall, so no AWS change is needed. TCP+UDP media
# share 8057; browsers use UDP when reachable, else fall back to TCP.
port: 7880
rtc:
  tcp_port: 8057
  udp_port: 8057
  use_external_ip: false
development: true
logging:
  level: info
