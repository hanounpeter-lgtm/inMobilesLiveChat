name: inmobiles-livechat

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inmobiles
      POSTGRES_PASSWORD: inmobiles
      POSTGRES_DB: inmobiles_chat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inmobiles"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: inmobiles
      MINIO_ROOT_PASSWORD: inmobiles-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 inmobiles inmobiles-secret;
      mc mb --ignore-existing local/chat-files;
      exit 0;
      "

  livekit:
    image: livekit/livekit-server:latest
    # --dev: API key "devkey" / secret "secret". --node-ip makes WebRTC
    # candidates point at the host so browsers can reach the container.
    command: --dev --bind 0.0.0.0 --node-ip 127.0.0.1
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
  miniodata:
